version: 0.0

os: linux

files:
  - source: /
    destination: /var/www/teste
    overwrite: true

permissions:
  - object: /var/www/teste
    owner: nginx
    group: nginx
    mode: 775
    type:
      - directory

hooks:

  BeforeInstall:
    - location: scripts/before_install.sh
      timeout: 300
      runas: root

  AfterInstall:
    - location: scripts/after_install.sh
      timeout: 300
      runas: root

  ApplicationStart:
    - location: scripts/application_start.sh
      timeout: 300
      runas: root